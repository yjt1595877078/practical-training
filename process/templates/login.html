{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">用户登录</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if message %}
    <div style="background:#f6ffed; border:1px solid #b7eb8f; color:#52c41a; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:16px;">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">登 录</button>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">个人中心</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if user %}
    <ul class="info-list">
        <li class="info-item">
            <span class="info-label">ID</span>
            <span class="info-value">{{ user['id'] }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">用户名</span>
            <span class="info-value">{{ user['username'] }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">邮箱</span>
            <span class="info-value">{{ user['email'] }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">手机</span>
            <span class="info-value">{{ user['phone'] }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">余额</span>
            <span class="info-value">{{ user['balance'] }}</span>
        </li>
    </ul>

    <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">
    <p class="guest-text">充值</p>
    <form method="POST" action="/recharge" style="display: flex; gap: 10px; align-items: flex-end;">
        <input type="hidden" name="user_id" value="{{ user['id'] }}">
        <div class="form-group" style="flex:1; margin-bottom:0;">
            <label class="form-label" for="amount">充值金额</label>
            <input class="form-input" type="number" id="amount" name="amount" step="0.01" placeholder="请输入金额" required>
        </div>
        <button class="btn btn-primary" type="submit" style="height:40px;">充值</button>
    </form>

    <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">
    <p class="guest-text">修改密码</p>
    <form method="POST" action="/change-password" style="display: flex; flex-direction: column; gap: 10px;">
        <input type="hidden" name="username" value="{{ user['username'] }}">
        <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" for="new_password">新密码</label>
            <input class="form-input" type="password" id="new_password" name="new_password" placeholder="请输入新密码" required>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" for="confirm_password">确认密码</label>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required>
        </div>
        <button class="btn btn-primary" type="submit" style="height:40px;">修改密码</button>
    </form>
    {% endif %}
</div>
{% endblock %}

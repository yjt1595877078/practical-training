{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">邮箱</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label class="form-label" for="phone">手机号</label>
            <input class="form-input" type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button class="btn btn-primary btn-block" type="submit">注 册</button>
    </form>

    <div class="text-center mt-20">
        <span style="font-size:13px; color:#888;">已有账号？</span>
        <a href="/login" style="font-size:13px; color:#667eea;">去登录</a>
    </div>
</div>
{% endblock %}

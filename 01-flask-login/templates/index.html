{% extends "base.html" %}

{% block content %}
<div class="card">
    {% if user %}
        <p class="welcome-text">欢迎回来，{{ user['username'] }}！</p>
        <p class="guest-text">以下是您的账户信息：</p>
        <ul class="info-list">
            <li class="info-item">
                <span class="info-label">用户名</span>
                <span class="info-value">{{ user['username'] }}</span>
            </li>
            <li class="info-item">
                <span class="info-label">邮箱</span>
                <span class="info-value">{{ user['email'] }}</span>
            </li>
            <li class="info-item">
                <span class="info-label">手机</span>
                <span class="info-value">{{ user['phone'] }}</span>
            </li>
            <li class="info-item">
                <span class="info-label">角色</span>
                <span class="info-value">{{ user['role'] }}</span>
            </li>
            <li class="info-item">
                <span class="info-label">余额</span>
                <span class="info-value">{{ user['balance'] }}</span>
            </li>
        </ul>
        <div class="text-center mt-20">
            <a class="btn btn-danger" href="/logout">退出登录</a>
        </div>
    {% else %}
        <p class="guest-text">请先登录</p>
        <div class="text-center">
            <a class="btn btn-primary" href="/login">前往登录</a>
        </div>
    {% endif %}
</div>
{% endblock %}
